# Per-patient fine-tuning of a pretrained generalist model.
# The model architecture, sequence_length, and input features are read from the
# pretrained checkpoint — only the fine-tuning knobs live here.
pretrained:   # <-- fill in: e.g. checkpoints/generalist/gru_R+M+LvR+M+L_beta0.5_ep150.pth
tasks: R+M+L

batch_size: 16384
split_percentages: [0.5, 0.3, 0.2]   # chronological train/val/test of one patient's frames

beta: 0.5
epochs: 30
patience: 20
lambda_l2sp: 1.0e-3
lr_body: 1.0e-4    # small LR for the backbone
lr_head: 3.0e-4    # larger LR for the final MLP head
dropout_ft: 0.05   # reduced dropout — the per-patient set is tiny

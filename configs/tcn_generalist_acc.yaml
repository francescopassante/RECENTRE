# Generalist TCN + velocity + acceleration features: input augmented with
# per-DOF velocity (1st diff) and acceleration (2nd diff), so 6 -> 18 channels.
# Output stays 6 (residual/baseline read only the positions, the first 6 chans).
# A/B against tcn_generalist_vel.yaml: only input_dim + add_acceleration differ.
output_dir: checkpoints/generalist

model:
  type: tcn          # key in MODELS (models.py); add new architectures there
  input_dim: 18      # 6 positions + 6 velocities + 6 accelerations
  output_dim: 6     #two last heads: one for mus one for sigmas
  num_channels: [64, 128]   # 2 residual blocks; dilation 1,2
  kernel_size: 3
  dropout: 0.2

data:
  train_task: R+M+L
  test_task: R+M+L   # overlapping tasks -> split_data auto-uses disjoint patients
  batch_size: 16384
  split_percentages: [0.7, 0.15, 0.15]
  cross_patients: false   # some patients do more tasks, if false the same patient can appear in train and test but with two diff tasks; if true, patients are disjoint across train and test
  sequence_length: 10     # input window = sequence_length frames, stride 2 (spans 2x frames)
  time_augmentation: false
  neg_augmentation: false
  add_velocity: true       # append first-difference (velocity) channels
  add_acceleration: true   # append second-difference (acceleration) channels -> input_dim 18



train:
  loss: gaussian_nll
  beta: 0.5
  epochs: 150
  patience: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4

# Generalist GRU: trained on all three tasks, tested on all three.
output_dir: checkpoints/generalist

model:
  type: gru          # key in MODELS (models.py); add new architectures there
  input_dim: 6
  hidden_dim: 128
  output_dim: 6
  num_layers: 2
  dropout: 0.5

data:
  train_task: R+M+L
  test_task: R+M+L   # overlapping tasks -> split_data auto-uses disjoint patients
  batch_size: 16384
  split_percentages: [0.7, 0.15, 0.15]
  cross_patients: false
  sequence_length: 10   # input window = sequence_length frames, stride 2 (spans 2x frames)

train:
  loss: gaussian_nll
  beta: 0.5
  epochs: 150
  patience: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4

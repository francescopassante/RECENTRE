# One point of the beta sweep. Change `beta` and re-run to add more checkpoints
# to checkpoints/beta_scan/, then compare them with compare.py.
output_dir: checkpoints/beta_scan

model:
  type: tcn
  input_dim: 6
  output_dim: 6
  num_channels: [64, 128, 128, 64]
  kernel_size: 2
  dropout: 0.2

data:
  train_task: R+M+L
  test_task: R+M+L
  batch_size: 16384
  split_percentages: [0.7, 0.15, 0.15]
  cross_patients: false
  sequence_length: 10

train:
  loss: gaussian_nll
  beta: 0.5          # <- sweep this: 0, 0.1, 0.5, 1, 10, 100
  epochs: 100
  patience: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4

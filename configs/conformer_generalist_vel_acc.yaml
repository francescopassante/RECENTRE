# Generalist Conformer + velocity + acceleration features: input augmented with
# per-DOF velocity (1st diff) and acceleration (2nd diff) at stride 2, so 6 -> 18
# channels. Output stays 6 (residual/baseline read only the positions, first 6
# chans). A/B against conformer_generalist.yaml: only input_dim + add_velocity +
# add_acceleration differ. Built from main's fixed stride-2 derivatives.
output_dir: checkpoints/generalist

model:
  type: conformer    # key in MODELS (models.py)
  input_dim: 18      # 6 positions + 6 velocities + 6 accelerations
  output_dim: 6
  d_model: 128
  nhead: 4           # must divide d_model
  num_layers: 2
  ff_expansion: 4    # feed-forward hidden = ff_expansion * d_model
  conv_kernel: 7     # depthwise conv kernel; must be odd and <= window length
  dropout: 0.1

data:
  train_task: R+M+L
  test_task: R+M+L   # overlapping tasks -> split_data auto-uses disjoint patients
  batch_size: 16384
  split_percentages: [0.7, 0.15, 0.15]
  cross_patients: false
  sequence_length: 10   # input window = sequence_length points, stride 2 (spans 2x frames)
  time_augmentation: false
  neg_augmentation: false
  add_velocity: true       # append first-difference (velocity) channels, stride 2
  add_acceleration: true   # append second-difference (acceleration) channels -> input_dim 18

train:
  loss: gaussian_nll
  beta: 0.5
  epochs: 150
  patience: 100
  lr: 1.0e-3
  weight_decay: 1.0e-4
